# ============================================================
# LAGAAO.COM — Nginx Configuration
# GoDaddy VPS — Ubuntu 22.04
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

# Upstream definitions
upstream frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name lagaao.com www.lagaao.com;
    return 301 https://$host$request_uri;
}

# HTTPS — Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lagaao.com www.lagaao.com;

    # SSL — Let's Encrypt / Certbot
    ssl_certificate     /etc/letsencrypt/live/lagaao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lagaao.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/lagaao.com/chain.pem;

    # SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        font/woff font/woff2 application/font-woff;
    gzip_min_length 1000;

    # Client settings
    client_max_body_size 50M;
    client_body_timeout 60s;

    # Logs
    access_log /var/log/nginx/lagaao.access.log;
    error_log  /var/log/nginx/lagaao.error.log;

    # ─── API Backend ────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept" always;
        add_header Access-Control-Allow-Credentials true always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── API Docs (dev/staging only — block in prod) ────────
    location /api/docs {
        deny all;
        return 403;
    }

    # ─── Static assets — long cache ─────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # ─── Public files ────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|webp|avif|svg|gif|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=86400";
    }

    # ─── Next.js frontend ───────────────────────────────────
    location / {
        limit_req zone=general burst=100 nodelay;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}

# phpMyAdmin — restrict to VPN/office IP
server {
    listen 443 ssl http2;
    server_name db.lagaao.com;

    ssl_certificate     /etc/letsencrypt/live/lagaao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lagaao.com/privkey.pem;

    # Restrict to specific IPs
    allow 103.0.0.0/24;   # Replace with your office IP range
    deny all;

    location / {
        root /usr/share/phpmyadmin;
        index index.php;
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}
